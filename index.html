<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Obłożenie zespołu</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f8f8f6;
    color: #1a1a1a;
    font-size: 13px;
    padding: 0;
    overflow-x: hidden;
  }

  .app { padding: 16px; max-width: 100%; }

  /* ── header ── */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
    flex-wrap: wrap;
    gap: 8px;
  }
  .header h1 { font-size: 15px; font-weight: 600; color: #1a1a1a; }
  .controls { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .controls label { font-size: 12px; color: #666; }
  select, input[type=number] {
    font-size: 12px;
    padding: 4px 8px;
    border: 1px solid #ddd;
    border-radius: 6px;
    background: #fff;
    color: #1a1a1a;
  }
  input[type=number] { width: 60px; }

  /* ── tabs ── */
  .tabs { display: flex; gap: 6px; margin-bottom: 14px; }
  .tab {
    padding: 4px 14px;
    border-radius: 12px;
    border: 1px solid #ddd;
    background: #f0efea;
    color: #666;
    font-size: 12px;
    cursor: pointer;
    transition: all .15s;
  }
  .tab.active { background: #4262ff; color: #fff; border-color: #4262ff; }

  /* ── summary cards ── */
  .summary {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
    gap: 8px;
    margin-bottom: 16px;
  }
  .card {
    background: #fff;
    border: 1px solid #e8e8e4;
    border-radius: 8px;
    padding: 10px 12px;
  }
  .card .lbl { font-size: 11px; color: #888; margin-bottom: 3px; }
  .card .val { font-size: 20px; font-weight: 600; }
  .card .sub { font-size: 10px; color: #aaa; margin-top: 2px; }
  .ok  { color: #1D9E75; }
  .warn{ color: #BA7517; }
  .over{ color: #A32D2D; }

  /* ── chart ── */
  .chart-section { background: #fff; border: 1px solid #e8e8e4; border-radius: 8px; padding: 14px; margin-bottom: 14px; }
  .chart-title { font-size: 12px; font-weight: 500; color: #666; margin-bottom: 10px; }
  .chart-wrap { position: relative; width: 100%; height: 220px; }

  /* ── free capacity table ── */
  .free-section { background: #fff; border: 1px solid #e8e8e4; border-radius: 8px; padding: 14px; margin-bottom: 14px; }
  .free-title { font-size: 12px; font-weight: 500; color: #666; margin-bottom: 10px; }
  table { width: 100%; border-collapse: collapse; font-size: 12px; }
  th {
    text-align: left;
    padding: 5px 8px;
    border-bottom: 1px solid #e8e8e4;
    font-weight: 500;
    color: #888;
    font-size: 11px;
  }
  td { padding: 5px 8px; border-bottom: 1px solid #f0efea; }
  td.num { text-align: right; font-variant-numeric: tabular-nums; }
  .bar-wrap { height: 10px; background: #f0efea; border-radius: 3px; overflow: hidden; position: relative; }
  .bar-used { height: 100%; border-radius: 3px; position: absolute; top: 0; left: 0; }
  .bar-free { height: 100%; border-radius: 3px; position: absolute; top: 0; background: #e1f5ee; }
  tr:last-child td { border-bottom: none; }
  tr.person-row td { background: #f8f8f6; font-weight: 500; font-size: 12px; }

  /* ── paste panel ── */
  .paste-panel { background: #fff; border: 1px solid #e8e8e4; border-radius: 8px; padding: 14px; margin-bottom: 14px; }
  .paste-panel .lbl { font-size: 12px; font-weight: 500; margin-bottom: 6px; }
  textarea {
    width: 100%;
    height: 100px;
    font-size: 11px;
    font-family: monospace;
    border: 1px solid #ddd;
    border-radius: 6px;
    padding: 8px;
    background: #fafafa;
    color: #1a1a1a;
    resize: vertical;
  }
  textarea:focus { outline: none; border-color: #4262ff; }
  .btn-row { display: flex; gap: 8px; margin-top: 8px; }
  button {
    padding: 5px 14px;
    border-radius: 6px;
    border: 1px solid #ddd;
    background: #f0efea;
    color: #1a1a1a;
    font-size: 12px;
    cursor: pointer;
  }
  button.primary { background: #4262ff; color: #fff; border-color: #4262ff; }
  .hint { font-size: 10px; color: #aaa; margin-top: 4px; }
  .err { font-size: 11px; color: #A32D2D; margin-top: 6px; }

  /* ── legend ── */
  .legend { display: flex; gap: 12px; flex-wrap: wrap; font-size: 11px; color: #888; margin-bottom: 10px; }
  .leg { display: flex; align-items: center; gap: 4px; }
  .leg-sq { width: 10px; height: 10px; border-radius: 2px; display: inline-block; }
</style>
</head>
<body>
<div class="app">

  <div class="header">
    <h1>Obłożenie zespołu</h1>
    <div class="controls">
      <label>Pojemność (h/tyg):</label>
      <input type="number" id="cap" value="40" min="1" max="80" oninput="renderAll()">
    </div>
  </div>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('exec',this)">Wykonanie</div>
    <div class="tab" onclick="switchTab('plan',this)">Plan</div>
    <div class="tab" onclick="switchTab('both',this)">Plan vs Wykonanie</div>
  </div>

  <div id="output" style="display:none">
    <div class="summary" id="summary-cards"></div>
    <div class="chart-section">
      <div class="chart-title" id="chart-title">Godziny wykonane per projekt (per tydzień)</div>
      <div class="legend" id="legend"></div>
      <div class="chart-wrap"><canvas id="myChart"></canvas></div>
    </div>
    <div class="free-section">
      <div class="free-title">Wolna pojemność per osoba per tydzień</div>
      <div id="free-table"></div>
    </div>
  </div>

  <div class="paste-panel" id="paste-panel">
    <div class="lbl">Wklej dane z tabeli Miro (zaznacz wszystko w tabeli → Ctrl+C → tu Ctrl+V)</div>
    <textarea id="raw" placeholder="Zadanie&#9;Data Ewidencji&#9;Tydzień&#9;Projekt&#9;Osoba&#9;Wykonanie&#9;Plan&#9;Przepalenie (%)&#9;Odchył (h)
Smurfit&#9;Mar 2, 2026&#9;10&#9;Szkolenie&#9;Asia&#9;4,00&#9;4,00&#9;100%&#9;0,0
Fabric&#9;Mar 2, 2026&#9;10&#9;Szkolenie&#9;Asia&#9;1,00&#9;1,00&#9;100%&#9;0,0"></textarea>
    <div class="btn-row">
      <button class="primary" onclick="parseAndRender()">Przelicz</button>
      <button onclick="loadDemo()">Załaduj przykład</button>
    </div>
    <div class="hint">Kolejność kolumn: Zadanie | Data | Tydzień | Projekt | Osoba | Wykonanie | Plan | ...</div>
    <div class="err" id="err"></div>
  </div>

</div>

<script>
const PROJ_COLORS = ['#7F77DD','#D85A30','#1D9E75','#378ADD','#EF9F27','#D4537E','#5DCAA5','#BA7517','#85B7EB','#F0997B'];
let DATA = [];
let activeTab = 'exec';
let chart = null;

const DEMO = `Zadanie\tData Ewidencji\tTydzień\tProjekt\tOsoba\tWykonanie\tPlan\tPrzepalenie (%)\tOdchył (h)
Smurfit\tMar 2, 2026\t10\tSzkolenie\tAsia\t4,00\t4,00\t100%\t0,0
Fabric\tMar 2, 2026\t10\tSzkolenie\tAsia\t1,00\t1,00\t100%\t0,0
Pliki\tMar 2, 2026\t10\tINDEKA\tAsia\t2,00\t\t\t
Weekly\tMar 2, 2026\t10\tOrganizacyjne\tAsia\t1,00\t1,00\t100%\t0,0
Spotkanie Smart\tMar 3, 2026\t10\tTMB Inwestycyjny\tAsia\t1,00\t\t\t
Spotkanie\tMar 3, 2026\t10\tOrganizacyjne\tAsia\t0,50\t\t\t
Raport KPI\tMar 3, 2026\t10\tINDEKA\tAsia\t6,00\t\t\t
Spotkanie Indeka\tMar 5, 2026\t10\tINDEKA\tAsia\t0,50\t\t\t
Raport KPI Stany\tMar 5, 2026\t10\tINDEKA\tAsia\t7,00\t\t\t
Raport KPI\tMar 4, 2026\t10\tINDEKA\tAsia\t7,00\t\t\t
Fabric\tMar 6, 2026\t10\tSzkolenie\tAsia\t4,00\t\t\t
Raport KPI Stany\tMar 6, 2026\t10\tINDEKA\tAsia\t3,00\t\t\t
Weekly\tMar 9, 2026\t11\tOrganizacyjne\tAsia\t1,00\t\t\t
Smurfit\tMar 9, 2026\t11\tSzkolenie\tAsia\t6,00\t\t\t
Newsletter\tMar 10, 2026\t11\tDziałalność online\tAsia\t1,00\t\t\t
Raport stany mag\tMar 10, 2026\t11\tINDEKA\tAsia\t4,00\t\t\t
zmiany w modelu\tMar 10, 2026\t11\tTMB Inwestycyjny\tAsia\t2,50\t\t\t
zmiany w raporcie\tMar 11, 2026\t11\tTMB Inwestycyjny\tAsia\t2,50\t\t\t
Kickoff\tMar 2, 2026\t10\tINDEKA\tBartek\t2,00\t2,00\t100%\t0,0
Dashboard v2\tMar 3, 2026\t10\tINDEKA\tBartek\t6,00\t\t\t
Raport sprzedaż\tMar 4, 2026\t10\tSzkolenie\tBartek\t3,00\t\t\t
Spotkanie\tMar 5, 2026\t10\tOrganizacyjne\tBartek\t1,00\t1,00\t\t
ETL fix\tMar 6, 2026\t10\tINDEKA\tBartek\t5,00\t\t\t
Weekly\tMar 9, 2026\t11\tOrganizacyjne\tBartek\t1,00\t\t\t
Dashboard v2\tMar 10, 2026\t11\tINDEKA\tBartek\t8,00\t\t\t
Raport TMB\tMar 11, 2026\t11\tTMB Inwestycyjny\tBartek\t4,00\t\t\t
Kickoff\tMar 2, 2026\t10\tSzkolenie\tCelina\t2,00\t2,00\t\t
Model danych\tMar 3, 2026\t10\tINDEKA\tCelina\t5,00\t\t\t
Spotkanie\tMar 4, 2026\t10\tOrganizacyjne\tCelina\t0,50\t\t\t
RLS setup\tMar 5, 2026\t10\tINDEKA\tCelina\t7,00\t\t\t
Weekly\tMar 9, 2026\t11\tOrganizacyjne\tCelina\t1,00\t\t\t
Model danych\tMar 10, 2026\t11\tINDEKA\tCelina\t6,00\t\t\t
Ops raport\tMar 11, 2026\t11\tOps\tCelina\t3,00\t\t\t`;

function parseNum(s) {
  if (!s || s.trim() === '' || s.trim() === 'No value') return 0;
  return parseFloat(s.replace(',', '.')) || 0;
}

function parseData(raw) {
  const lines = raw.trim().split('\n').filter(l => l.trim());
  if (lines.length < 2) return [];
  const header = lines[0].split('\t').map(h => h.trim().toLowerCase());
  const iWeek = header.findIndex(h => h.includes('tydzień') || h.includes('tydzien') || h === 'week');
  const iProj = header.findIndex(h => h.includes('projekt') || h.includes('project'));
  const iOsoba = header.findIndex(h => h.includes('osoba') || h.includes('person'));
  const iExec = header.findIndex(h => h.includes('wykonanie') || h.includes('exec') || h.includes('actual'));
  const iPlan = header.findIndex(h => h.includes('plan'));
  if ([iWeek, iProj, iOsoba, iExec].some(i => i === -1)) return null;
  return lines.slice(1).map(line => {
    const cols = line.split('\t');
    return {
      week: parseInt(cols[iWeek]) || 0,
      proj: (cols[iProj] || '').trim(),
      person: (cols[iOsoba] || '').trim(),
      exec: parseNum(cols[iExec]),
      plan: iPlan >= 0 ? parseNum(cols[iPlan]) : 0,
    };
  }).filter(r => r.week && r.person && r.proj);
}

function loadDemo() {
  document.getElementById('raw').value = DEMO;
  parseAndRender();
}

function parseAndRender() {
  const raw = document.getElementById('raw').value;
  const parsed = parseData(raw);
  if (!parsed) {
    document.getElementById('err').textContent = 'Nie znaleziono kolumn: Tydzień, Projekt, Osoba, Wykonanie. Sprawdź czy dane są oddzielone tabulatorem.';
    return;
  }
  if (parsed.length === 0) {
    document.getElementById('err').textContent = 'Brak danych. Wklej dane z tabeli Miro.';
    return;
  }
  document.getElementById('err').textContent = '';
  DATA = parsed;
  document.getElementById('output').style.display = 'block';
  renderAll();
}

function switchTab(tab, el) {
  activeTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  renderAll();
}

function getCap() { return parseInt(document.getElementById('cap').value) || 40; }

function renderAll() {
  if (!DATA.length) return;
  const cap = getCap();
  const people = [...new Set(DATA.map(r => r.person))].sort();
  const weeks = [...new Set(DATA.map(r => r.week))].sort((a, b) => a - b);
  const projs = [...new Set(DATA.map(r => r.proj))].sort();
  const colorMap = {};
  projs.forEach((p, i) => colorMap[p] = PROJ_COLORS[i % PROJ_COLORS.length]);

  // summary cards
  const totalExec = DATA.reduce((s, r) => s + r.exec, 0);
  const totalPlan = DATA.reduce((s, r) => s + r.plan, 0);
  const avgPct = Math.round((totalExec / (people.length * weeks.length * cap)) * 100);
  const cls = avgPct > 100 ? 'over' : avgPct >= 90 ? 'warn' : 'ok';
  const totalFree = people.length * weeks.length * cap - totalExec;
  document.getElementById('summary-cards').innerHTML = `
    <div class="card"><div class="lbl">Łączne wykonanie</div><div class="val">${totalExec.toFixed(1)}h</div><div class="sub">${people.length} os · ${weeks.length} tygodnie</div></div>
    <div class="card"><div class="lbl">Łączny plan</div><div class="val">${totalPlan.toFixed(1)}h</div><div class="sub">wpisany plan</div></div>
    <div class="card"><div class="lbl">Śr. obłożenie</div><div class="val ${cls}">${avgPct}%</div><div class="sub">z ${cap}h pojemności</div></div>
    <div class="card"><div class="lbl">Wolna pojemność</div><div class="val ok">${Math.max(0, totalFree).toFixed(1)}h</div><div class="sub">łącznie zespół</div></div>
  `;

  // chart
  const labels = weeks.map(w => `Tyg. ${w}`);
  let datasets = [];

  if (activeTab === 'exec' || activeTab === 'both') {
    projs.forEach(proj => {
      const d = weeks.map(w => {
        return DATA.filter(r => r.week === w && r.proj === proj).reduce((s, r) => s + r.exec, 0);
      });
      if (d.some(v => v > 0)) {
        datasets.push({
          label: proj + (activeTab === 'both' ? ' (wyk.)' : ''),
          data: d,
          backgroundColor: colorMap[proj],
          stack: 'exec',
        });
      }
    });
  }

  if (activeTab === 'plan' || activeTab === 'both') {
    projs.forEach(proj => {
      const d = weeks.map(w => {
        return DATA.filter(r => r.week === w && r.proj === proj).reduce((s, r) => s + r.plan, 0);
      });
      if (d.some(v => v > 0)) {
        datasets.push({
          label: proj + (activeTab === 'both' ? ' (plan)' : ''),
          data: d,
          backgroundColor: colorMap[proj] + '66',
          stack: 'plan',
        });
      }
    });
  }

  const titles = { exec: 'Wykonanie per projekt per tydzień (h)', plan: 'Plan per projekt per tydzień (h)', both: 'Plan vs Wykonanie per tydzień (h)' };
  document.getElementById('chart-title').textContent = titles[activeTab];

  // legend
  document.getElementById('legend').innerHTML = projs.filter(p => datasets.some(d => d.label.startsWith(p))).map(p =>
    `<span class="leg"><span class="leg-sq" style="background:${colorMap[p]}"></span>${p}</span>`
  ).join('');

  if (chart) chart.destroy();
  chart = new Chart(document.getElementById('myChart'), {
    type: 'bar',
    data: { labels, datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: ctx => `${ctx.dataset.label}: ${ctx.parsed.y.toFixed(1)}h`
          }
        }
      },
      scales: {
        x: { stacked: true, grid: { display: false }, ticks: { font: { size: 11 } } },
        y: {
          stacked: true,
          ticks: { font: { size: 11 }, callback: v => v + 'h' },
          grid: { color: '#f0efea' }
        }
      }
    }
  });

  // free capacity table
  let tableHtml = `<table><thead><tr><th>Osoba</th>${weeks.map(w => `<th style="text-align:right">Tyg. ${w}</th>`).join('')}<th style="text-align:right">Razem wolne</th></tr></thead><tbody>`;
  people.forEach(person => {
    const freeVals = weeks.map(w => {
      const used = DATA.filter(r => r.person === person && r.week === w).reduce((s, r) => s + r.exec, 0);
      return Math.max(0, cap - used);
    });
    const totalFreeP = freeVals.reduce((s, v) => s + v, 0);
    const avgUsed = weeks.map(w => DATA.filter(r => r.person === person && r.week === w).reduce((s, r) => s + r.exec, 0));
    tableHtml += `<tr class="person-row"><td>${person}</td>`;
    freeVals.forEach((free, i) => {
      const used = cap - free;
      const usedPct = Math.round((used / cap) * 100);
      const freePct = Math.round((free / cap) * 100);
      const cls = usedPct > 100 ? 'over' : usedPct >= 90 ? 'warn' : free === 0 ? 'warn' : 'ok';
      tableHtml += `<td>
        <div style="display:flex;justify-content:space-between;margin-bottom:3px">
          <span class="${cls}" style="font-weight:500">${free.toFixed(1)}h wolne</span>
          <span style="color:#aaa;font-size:10px">${used.toFixed(1)}/${cap}h</span>
        </div>
        <div class="bar-wrap">
          <div class="bar-used" style="width:${Math.min(usedPct,100)}%;background:${usedPct>100?'#A32D2D':usedPct>=90?'#BA7517':'#7F77DD'};opacity:.7"></div>
          <div class="bar-free" style="left:${Math.min(usedPct,100)}%;width:${freePct}%"></div>
        </div>
      </td>`;
    });
    tableHtml += `<td class="num ok" style="font-weight:500">${totalFreeP.toFixed(1)}h</td></tr>`;
  });
  tableHtml += '</tbody></table>';
  document.getElementById('free-table').innerHTML = tableHtml;
}
</script>
</body>
</html>
