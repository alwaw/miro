<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Obłożenie zespołu</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f3;color:#1a1a1a;font-size:13px}
.app{padding:16px}
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px}
.topbar h1{font-size:15px;font-weight:600}
.cap-info{font-size:12px;color:#888;display:flex;align-items:center;gap:6px}
.cap-badge{background:#1a1a1a;color:#fff;border-radius:10px;padding:2px 8px;font-size:11px;font-weight:600}

.view-tabs{display:flex;gap:6px;margin-bottom:14px;border-bottom:1px solid #e0e0dc;padding-bottom:10px}
.vtab{padding:5px 16px;border-radius:20px;border:1px solid #ddd;background:#fff;color:#666;font-size:12px;cursor:pointer}
.vtab.active{background:#1a1a1a;color:#fff;border-color:#1a1a1a}

.mode-tabs{display:flex;gap:6px;margin-bottom:14px}
.mtab{padding:4px 14px;border-radius:20px;border:1px solid #ddd;background:#fff;color:#666;font-size:12px;cursor:pointer}
.mtab.active{background:#4262ff;color:#fff;border-color:#4262ff}

.ptabs{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.ptab{padding:4px 12px;border-radius:20px;border:1px solid #ddd;background:#fff;color:#666;font-size:12px;cursor:pointer}
.ptab.active{border-color:#1a1a1a;background:#1a1a1a;color:#fff}

/* PROJECT VIEW */
.proj-grid{display:flex;flex-direction:column;gap:0;background:#fff;border:1px solid #e0e0dc;border-radius:12px;overflow:hidden;margin-bottom:14px}
.proj-header{display:grid;background:#fafaf8;border-bottom:1px solid #e0e0dc}
.ph-corner{padding:10px 14px;font-size:11px;color:#aaa;border-right:1px solid #e0e0dc}
.ph-wk{padding:10px 14px;text-align:center;border-left:1px solid #e0e0dc}
.ph-wk-main{font-size:12px;font-weight:600;color:#1a1a1a}
.ph-wk-sub{font-size:10px;color:#aaa;margin-top:1px}
.ph-wk-cap{font-size:10px;color:#aaa;margin-top:1px}

.proj-row{display:grid;border-top:1px solid #e0e0dc}
.proj-name-cell{padding:14px;border-right:1px solid #e0e0dc;background:#fafaf8;display:flex;align-items:flex-start;gap:10px}
.proj-color-bar{width:4px;border-radius:2px;flex-shrink:0;min-height:20px;align-self:stretch;margin-top:2px}
.proj-name{font-size:13px;font-weight:600;color:#1a1a1a}
.proj-total-sub{font-size:10px;color:#aaa;margin-top:2px}

.proj-week-cell{padding:12px;border-left:1px solid #e0e0dc;display:flex;flex-direction:column;gap:6px}
.empty-cell{display:flex;align-items:center;justify-content:center;color:#ddd;font-size:12px}

/* THE main bar */
.main-bar-wrap{position:relative;height:20px;background:#f0efea;border-radius:5px;overflow:hidden}
.main-bar-fill{position:absolute;left:0;top:0;height:100%;border-radius:5px;transition:width .3s}
.main-bar-label{position:absolute;right:6px;top:50%;transform:translateY(-50%);font-size:10px;font-weight:700;white-space:nowrap}

/* pct + hours row */
.bar-meta{display:flex;align-items:center;justify-content:space-between;margin-top:2px}
.bar-pct{font-size:11px;font-weight:700}
.bar-hrs{font-size:10px;color:#aaa}

/* developer breakdown */
.dev-breakdown{display:flex;flex-direction:column;gap:2px;margin-top:2px;padding-top:6px;border-top:1px solid #f0efea}
.dev-line{display:flex;align-items:center;gap:6px;font-size:11px}
.dev-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.dev-name{color:#666;flex:1}
.dev-h{font-weight:600;color:#1a1a1a}
.dev-mini-bar{flex:2;height:4px;background:#f0efea;border-radius:2px;overflow:hidden}
.dev-mini-fill{height:100%;border-radius:2px}

/* PERSON VIEW */
.timeline{background:#fff;border:1px solid #e0e0dc;border-radius:12px;overflow:hidden;margin-bottom:14px}
.t-header{display:grid;border-bottom:1px solid #e0e0dc;background:#fafaf8}
.t-corner{padding:10px 14px;font-size:11px;color:#aaa;border-right:1px solid #e0e0dc}
.t-wk{padding:10px 14px;font-size:12px;font-weight:600;color:#1a1a1a;border-left:1px solid #e0e0dc;text-align:center}
.t-wk-sub{font-size:10px;font-weight:400;color:#aaa;display:block;margin-top:1px}
.t-row{display:grid;border-top:1px solid #e0e0dc}
.t-label{padding:14px;border-right:1px solid #e0e0dc;background:#fafaf8;display:flex;align-items:flex-start;gap:10px}
.avatar{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0;margin-top:1px}
.p-name{font-size:13px;font-weight:600;color:#1a1a1a;margin-bottom:2px}
.p-sub{font-size:10px;color:#aaa}
.t-cell{padding:12px;border-left:1px solid #e0e0dc;display:flex;flex-direction:column;gap:4px;min-height:80px}
.pill{display:flex;align-items:center;gap:7px;border-radius:6px;padding:5px 9px;font-size:11px;border:1px solid transparent}
.pill-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.pill-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:500}
.pill-h{font-weight:700;font-size:11px;flex-shrink:0}
.divider{height:1px;background:#f0efea;margin:2px 0}
.stack-bar{height:7px;border-radius:4px;overflow:hidden;display:flex;margin-bottom:5px}
.stack-seg{height:100%}
.stack-free{background:#f0efea}
.bottom-row{display:flex;align-items:center;justify-content:space-between;gap:6px}
.used-label{font-size:10px;color:#aaa}
.free-label{font-size:12px;font-weight:700}
.free-ok{color:#1D9E75}.free-warn{color:#BA7517}.free-over{color:#A32D2D}

.paste{background:#fff;border:1px solid #e0e0dc;border-radius:12px;padding:14px;margin-bottom:14px}
.paste-lbl{font-size:12px;font-weight:500;margin-bottom:6px}
textarea{width:100%;height:90px;font-size:11px;font-family:monospace;border:1px solid #ddd;border-radius:6px;padding:8px;background:#fafafa;color:#1a1a1a;resize:vertical}
textarea:focus{outline:none;border-color:#4262ff}
.btn-row{display:flex;gap:8px;margin-top:8px}
button{padding:5px 14px;border-radius:6px;border:1px solid #ddd;background:#f0efea;color:#1a1a1a;font-size:12px;cursor:pointer}
button.primary{background:#4262ff;color:#fff;border-color:#4262ff}
.err{font-size:11px;color:#A32D2D;margin-top:6px;min-height:14px}
.dbg{font-size:10px;color:#ccc;margin-top:3px;font-family:monospace}
</style>
</head>
<body>
<div class="app">

<div class="topbar">
  <h1>Obłożenie zespołu</h1>
  <div class="cap-info">
    <span>Pojemność tygodniowa:</span>
    <span class="cap-badge" id="cap-badge">— h</span>
  </div>
</div>

<div class="view-tabs">
  <div class="vtab active" onclick="switchView('projects',this)">Projekty</div>
  <div class="vtab" onclick="switchView('people',this)">Deweloperzy</div>
</div>

<div class="mode-tabs">
  <div class="mtab active" onclick="switchMode('exec',this)">Wykonanie</div>
  <div class="mtab" onclick="switchMode('plan',this)">Plan</div>
</div>

<div class="ptabs" id="ptabs" style="display:none"></div>
<div id="main"></div>

<div class="paste">
  <div class="paste-lbl">Wklej dane z tabeli Miro (zaznacz wszystko → Ctrl+C → Ctrl+V tu)</div>
  <textarea id="raw" placeholder="Wklej dane z Miro..."></textarea>
  <div class="btn-row">
    <button class="primary" onclick="parseAndRender()">Przelicz</button>
    <button onclick="loadDemo()">Przykład</button>
  </div>
  <div class="err" id="err"></div>
  <div class="dbg" id="dbg"></div>
</div>

</div>
<script>
const CAP_PER_PERSON = 40;

const PROJ_PALETTE = [
  {dot:'#7F77DD',bg:'#EEEDFE',border:'#AFA9EC',text:'#3C3489'},
  {dot:'#D85A30',bg:'#FAECE7',border:'#F0997B',text:'#712B13'},
  {dot:'#1D9E75',bg:'#E1F5EE',border:'#9FE1CB',text:'#085041'},
  {dot:'#378ADD',bg:'#E6F1FB',border:'#B5D4F4',text:'#0C447C'},
  {dot:'#EF9F27',bg:'#FAEEDA',border:'#FAC775',text:'#633806'},
  {dot:'#D4537E',bg:'#FBEAF0',border:'#F4C0D1',text:'#72243E'},
  {dot:'#639922',bg:'#EAF3DE',border:'#C0DD97',text:'#27500A'},
  {dot:'#888780',bg:'#F1EFE8',border:'#D3D1C7',text:'#444441'},
  {dot:'#E24B4A',bg:'#FCEBEB',border:'#F7C1C1',text:'#791F1F'},
  {dot:'#0F6E56',bg:'#E1F5EE',border:'#5DCAA5',text:'#04342C'},
];

const PERSON_DOTS = ['#1a1a1a','#4262ff','#D85A30','#1D9E75','#7F77DD'];
const AVATAR_COLORS = [
  {bg:'#EEEDFE',color:'#3C3489'},{bg:'#E1F5EE',color:'#085041'},
  {bg:'#E6F1FB',color:'#0C447C'},{bg:'#FAEEDA',color:'#633806'},{bg:'#FBEAF0',color:'#72243E'},
];

let DATA=[], mode='exec', activeView='projects', activePerson='all';
let projColorMap={}, personDotMap={}, peopleColors={};

const DEMO="Tygodniowy zbiorczo\nSpotkania\t2026-03-16T00:00:00.000Z\t12\tOrganizacyjne\tAsia\t1\t\nPliki i raport KPI\t2026-03-16T00:00:00.000Z\t12\tINDEKA\tAsia\t3\t\nSpotkanie\t2026-03-16T00:00:00.000Z\t12\tTMB Inwestycyjny\tAsia\t0.5\t\nZmiany w raporcie\t2026-03-17T00:00:00.000Z\t12\tTMB Inwestycyjny\tAsia\t2\t\nRaporty\t2026-03-18T00:00:00.000Z\t12\tINDEKA\tAsia\t5.5\t\nRaport KPI\t2026-03-19T00:00:00.000Z\t12\tINDEKA\tAsia\t3\t\nTesty aplikacji\t2026-03-16T00:00:00.000Z\t12\tTMB Inwestycyjny\tAsia\t3\t\nFabric\t2026-03-17T00:00:00.000Z\t12\tSzkolenie\tAsia\t1.5\t\nWeekly\t2026-03-23T00:00:00.000Z\t12\tOrganizacyjne\tAsia\t1.5\t\nRaport Stany\t2026-03-23T00:00:00.000Z\t12\tINDEKA\tAsia\t4\t\nSpotkanie z indeką\t2026-03-19T00:00:00.000Z\t12\tINDEKA\tAsia\t1\t\nDaily\t2026-03-17T00:00:00.000Z\t12\tOrganizacyjne\tAsia\t0.5\t\nSpotkanie z Michałem\t2026-03-19T00:00:00.000Z\t12\tINDEKA\tAsia\t1\t\nSpotkanie Smart\t2026-03-24T00:00:00.000Z\t13\tTMB Inwestycyjny\tAsia\t1.25\t\nDaily\t2026-03-25T00:00:00.000Z\t13\tOrganizacyjne\tAsia\t0.5\t\nSpotkanie z Pawłem\t2026-03-24T00:00:00.000Z\t13\tTMB Inwestycyjny\tAsia\t1.5\t\nWeekly\t2026-03-23T00:00:00.000Z\t13\tOrganizacyjne\tAsia\t1.5\t\nRaport Stany\t2026-03-23T00:00:00.000Z\t13\tINDEKA\tAsia\t4\t\nWeekly raportowe\t2026-03-16T00:00:00.000Z\t12\tOrganizacyjne\tPaweł\t1.25\t\nSzkolenie Fabric\t2026-03-17T00:00:00.000Z\t12\tSzkolenie\tPaweł\t7.25\t1.5\nSzkolenie Fabric\t2026-03-18T00:00:00.000Z\t12\tSzkolenie\tPaweł\t7.25\t\nTMBL spotkanie\t2026-03-19T00:00:00.000Z\t12\tTMB\tPaweł\t2\t\nStart up club\t2026-03-20T00:00:00.000Z\t12\tZarządcze\tPaweł\t8\t\nMag zwroty\t2026-03-16T00:00:00.000Z\t12\tTMB\tPaweł\t5\t\nUmowy\t2026-03-16T00:00:00.000Z\t12\tOrganizacyjne\tPaweł\t0.5\t\nSprzedażowe\t2026-03-16T00:00:00.000Z\t12\tSprzedaż\tPaweł\t1\t\nWeekly raportowe\t2026-03-23T00:00:00.000Z\t13\tOrganizacyjne\tPaweł\t1.5\t1.5\nSpotkanie zarządu\t2026-03-24T00:00:00.000Z\t13\tZarządcze\tPaweł\t2\t1.5\nTMB inwestycyjny\t2026-03-25T00:00:00.000Z\t13\tTMB Inwestycyjny\tPaweł\t1.5\t1\nSprzedażowe\t2026-03-24T00:00:00.000Z\t13\tSprzedaż\tPaweł\t1.5\t1\nIndeka spotkanie\t2026-03-24T00:00:00.000Z\t13\tINDEKA\tPaweł\t0.6\t\nOrganizacyjne\t2026-03-23T00:00:00.000Z\t13\tOrganizacyjne\tPaweł\t1\t\nCRM\t2026-03-27T00:00:00.000Z\t13\tSprzedaż\tPaweł\t1\t\nWeryfikacja\t2026-03-27T00:00:00.000Z\t13\tINDEKA\tPaweł\t0.5\t\nSzkolenia\t2026-03-27T00:00:00.000Z\t13\tSzkolenie\tPaweł\t0.75\t\nZarządcze różne\t2026-03-25T00:00:00.000Z\t13\tZarządcze\tPaweł\t3.75\t\nSprzedaż Greekbox\t2026-03-26T00:00:00.000Z\t13\tSprzedaż\tPaweł\t1.25\t\nDaily\t2026-03-24T00:00:00.000Z\t13\tOrganizacyjne\tPaweł\t0.25\t";

function parseNum(s){if(!s||s.trim()===''||s.trim()==='No value')return 0;return parseFloat(s.replace(',','.'))||0;}
function getISOWeek(str){const d=new Date(str);if(isNaN(d))return 0;const dt=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));const day=dt.getUTCDay()||7;dt.setUTCDate(dt.getUTCDate()+4-day);const y0=new Date(Date.UTC(dt.getUTCFullYear(),0,1));return Math.ceil((((dt-y0)/86400000)+1)/7);}
function weekDates(w){const jan4=new Date(Date.UTC(2026,0,4));const day1=jan4.getUTCDay()||7;const mon=new Date(jan4);mon.setUTCDate(jan4.getUTCDate()-day1+1+(w-1)*7);const fri=new Date(mon);fri.setUTCDate(mon.getUTCDate()+4);const f=d=>d.getUTCDate()+'.'+(d.getUTCMonth()+1).toString().padStart(2,'0');return f(mon)+'–'+f(fri);}

function parseData(raw){
  const allLines=raw.trim().split('\n').map(l=>l.trimEnd()).filter(l=>l);
  const dataLines=allLines.filter(l=>l.split('\t').some(c=>/\d{4}-\d{2}-\d{2}/.test(c)||/[A-Za-z]{3}\s+\d+,/.test(c)));
  if(!dataLines.length)return{rows:null,dbg:'Brak wierszy z datą.'};
  const sample=dataLines.slice(0,Math.min(15,dataLines.length)).map(l=>l.split('\t'));
  const ncols=Math.max(...sample.map(r=>r.length));
  let iDate=-1,iWeek=-1,iProj=-1,iOsoba=-1,iExec=-1,iPlan=-1;
  for(let c=0;c<ncols;c++){
    const vals=sample.map(r=>(r[c]||'').trim()).filter(v=>v&&v!=='No value');
    if(!vals.length)continue;
    const dateH=vals.filter(v=>/\d{4}-\d{2}-\d{2}/.test(v)||/[A-Za-z]{3}\s+\d+,/.test(v)).length;
    const intH=vals.filter(v=>/^\d{1,3}$/.test(v)).length;
    const numH=vals.filter(v=>!isNaN(parseFloat(v.replace(',','.')))).length;
    const avgLen=vals.reduce((s,v)=>s+v.length,0)/vals.length;
    if(dateH>vals.length*.5&&iDate<0){iDate=c;continue;}
    if(intH>vals.length*.5&&iDate>=0&&iWeek<0&&c!==iDate){iWeek=c;continue;}
    if(numH>vals.length*.4&&avgLen<8){if(iExec<0&&(iProj>=0||iOsoba>=0)){iExec=c;continue;}if(iPlan<0&&iExec>=0){iPlan=c;continue;}}
    if(numH<vals.length*.3&&avgLen>2&&avgLen<28){if(iProj<0&&iDate>=0){iProj=c;continue;}if(iOsoba<0&&iProj>=0){iOsoba=c;continue;}}
  }
  const dbg=`Kolumny → Data:${iDate} Tyg:${iWeek} Proj:${iProj} Osoba:${iOsoba} Wyk:${iExec} Plan:${iPlan}`;
  if([iProj,iOsoba,iExec].some(i=>i<0))return{rows:null,dbg};
  const rows=dataLines.map(line=>{
    const cols=line.split('\t');
    let week=iWeek>=0?parseInt(cols[iWeek])||0:0;
    if(!week&&iDate>=0)week=getISOWeek((cols[iDate]||'').trim());
    return{week,proj:(cols[iProj]||'').trim(),person:(cols[iOsoba]||'').trim(),exec:parseNum(cols[iExec]),plan:iPlan>=0?parseNum(cols[iPlan]):0};
  }).filter(r=>r.week&&r.proj&&r.person);
  return{rows,dbg};
}

function loadDemo(){document.getElementById('raw').value=DEMO;parseAndRender();}

function parseAndRender(){
  const{rows,dbg}=parseData(document.getElementById('raw').value);
  document.getElementById('dbg').textContent=dbg||'';
  if(!rows){document.getElementById('err').textContent='Nie wykryto kolumn. '+dbg;return;}
  if(!rows.length){document.getElementById('err').textContent='Brak wierszy.';return;}
  document.getElementById('err').textContent='';
  DATA=rows;

  const projs=[...new Set(DATA.map(r=>r.proj))].sort();
  projColorMap={};
  projs.forEach((p,i)=>{projColorMap[p]=PROJ_PALETTE[i%PROJ_PALETTE.length];});

  const people=[...new Set(DATA.map(r=>r.person))].sort();
  personDotMap={};
  people.forEach((p,i)=>{personDotMap[p]=PERSON_DOTS[i%PERSON_DOTS.length];});
  peopleColors={};
  people.forEach((p,i)=>{peopleColors[p]=AVATAR_COLORS[i%AVATAR_COLORS.length];});

  const teamCap=people.length*CAP_PER_PERSON;
  document.getElementById('cap-badge').textContent=`${people.length} os. × 40h = ${teamCap}h`;

  activePerson='all';
  document.getElementById('ptabs').innerHTML=
    '<div class="ptab active" onclick="switchPerson(\'all\',this)">Cały zespół</div>'
    +people.map(p=>`<div class="ptab" onclick="switchPerson('${encodeURIComponent(p)}',this)">${p}</div>`).join('');

  render();
}

function switchView(v,el){
  activeView=v;
  document.querySelectorAll('.vtab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('ptabs').style.display=v==='people'?'flex':'none';
  render();
}
function switchMode(m,el){
  mode=m;
  document.querySelectorAll('.mtab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  render();
}
function switchPerson(p,el){
  activePerson=decodeURIComponent(p);
  document.querySelectorAll('.ptab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  render();
}

function h(r){return mode==='exec'?r.exec:r.plan;}

function render(){
  if(!DATA.length)return;
  activeView==='projects'?renderProjects():renderPeople();
}

function renderProjects(){
  const weeks=[...new Set(DATA.map(r=>r.week))].sort((a,b)=>a-b);
  const people=[...new Set(DATA.map(r=>r.person))].sort();
  const teamCap=people.length*CAP_PER_PERSON;

  // sort projects by total hours across all data, desc
  const projs=[...new Set(DATA.map(r=>r.proj))];
  const projsSorted=projs.map(p=>({p,total:DATA.filter(r=>r.proj===p).reduce((s,r)=>s+h(r),0)}))
    .sort((a,b)=>b.total-a.total).map(x=>x.p);

  const nameW=180;
  const gridCols=`${nameW}px `+weeks.map(()=>`minmax(0,1fr)`).join(' ');

  let html=`<div class="proj-grid">`;

  // header
  html+=`<div class="proj-header" style="grid-template-columns:${gridCols}">`;
  html+=`<div class="ph-corner">Projekt</div>`;
  weeks.forEach(w=>{
    html+=`<div class="ph-wk" style="border-left:1px solid #e0e0dc">
      <div class="ph-wk-main">Tyg. ${w}</div>
      <div class="ph-wk-sub">${weekDates(w)}</div>
      <div class="ph-wk-cap">pojemność: ${teamCap}h</div>
    </div>`;
  });
  html+='</div>';

  projsSorted.forEach(proj=>{
    const pc=projColorMap[proj];
    const projAllH=DATA.filter(r=>r.proj===proj).reduce((s,r)=>s+h(r),0);

    html+=`<div class="proj-row" style="grid-template-columns:${gridCols}">`;

    // name cell
    html+=`<div class="proj-name-cell">
      <div class="proj-color-bar" style="background:${pc.dot}"></div>
      <div>
        <div class="proj-name">${proj}</div>
        <div class="proj-total-sub">łącznie ${projAllH.toFixed(1)}h</div>
      </div>
    </div>`;

    weeks.forEach(w=>{
      const weekTotal=DATA.filter(r=>r.proj===proj&&r.week===w).reduce((s,r)=>s+h(r),0);

      if(weekTotal<=0){
        html+=`<div class="proj-week-cell empty-cell" style="border-left:1px solid #e0e0dc">—</div>`;
        return;
      }

      const pct=Math.min((weekTotal/teamCap)*100,100);
      const pctLabel=Math.round((weekTotal/teamCap)*100);

      // bar color: green if ≤30%, amber if ≤60%, project color otherwise
      const barColor=pc.dot;

      // per-person breakdown sorted desc
      const devBreakdown=people.map(person=>({
        person,
        h:DATA.filter(r=>r.proj===proj&&r.week===w&&r.person===person).reduce((s,r)=>s+h(r),0)
      })).filter(x=>x.h>0).sort((a,b)=>b.h-a.h);

      html+=`<div class="proj-week-cell" style="border-left:1px solid #e0e0dc">`;

      // MAIN BAR
      html+=`<div>
        <div class="main-bar-wrap">
          <div class="main-bar-fill" style="width:${pct}%;background:${barColor}"></div>
        </div>
        <div class="bar-meta">
          <span class="bar-pct" style="color:${barColor}">${pctLabel}% tygodnia</span>
          <span class="bar-hrs">${weekTotal.toFixed(1)}h / ${teamCap}h</span>
        </div>
      </div>`;

      // DEV BREAKDOWN
      html+=`<div class="dev-breakdown">`;
      devBreakdown.forEach(({person,h:dh})=>{
        const dot=personDotMap[person];
        const miniPct=Math.min((dh/CAP_PER_PERSON)*100,100);
        html+=`<div class="dev-line">
          <span class="dev-dot" style="background:${dot}"></span>
          <span class="dev-name">${person}</span>
          <div class="dev-mini-bar"><div class="dev-mini-fill" style="width:${miniPct}%;background:${dot}"></div></div>
          <span class="dev-h">${dh.toFixed(1)}h</span>
        </div>`;
      });
      html+=`</div>`;

      html+=`</div>`;
    });

    html+='</div>';
  });

  html+='</div>';
  document.getElementById('main').innerHTML=html;
}

function renderPeople(){
  const weeks=[...new Set(DATA.map(r=>r.week))].sort((a,b)=>a-b);
  const allPeople=[...new Set(DATA.map(r=>r.person))].sort();
  const people=activePerson==='all'?allPeople:[activePerson];
  const projs=[...new Set(DATA.map(r=>r.proj))].sort();
  const gridCols=`160px `+weeks.map(()=>`minmax(0,1fr)`).join(' ');

  let html=`<div class="timeline"><div class="t-header" style="grid-template-columns:${gridCols}">`;
  html+=`<div class="t-corner">Deweloper</div>`;
  weeks.forEach(w=>{html+=`<div class="t-wk">Tyg. ${w}<span class="t-wk-sub">${weekDates(w)}</span></div>`;});
  html+='</div>';

  people.forEach(person=>{
    const ac=peopleColors[person]||AVATAR_COLORS[0];
    const initials=person.split(' ').map(w=>w[0]).join('').substring(0,2).toUpperCase();
    html+=`<div class="t-row" style="grid-template-columns:${gridCols}">`;
    html+=`<div class="t-label">
      <div class="avatar" style="background:${ac.bg};color:${ac.color}">${initials}</div>
      <div><div class="p-name">${person}</div><div class="p-sub">40h / tydzień</div></div>
    </div>`;

    weeks.forEach(w=>{
      const hrs=DATA.filter(r=>r.person===person&&r.week===w).reduce((s,r)=>s+h(r),0);
      const projData=projs.map(proj=>({proj,ph:DATA.filter(r=>r.proj===proj&&r.person===person&&r.week===w).reduce((s,r)=>s+h(r),0)}))
        .filter(x=>x.ph>0).sort((a,b)=>b.ph-a.ph);
      const free=Math.max(0,CAP_PER_PERSON-hrs);
      const overflow=Math.max(0,hrs-CAP_PER_PERSON);
      const freeCls=hrs>CAP_PER_PERSON?'free-over':hrs>=CAP_PER_PERSON*.9?'free-warn':'free-ok';
      const freeText=hrs>CAP_PER_PERSON?`-${overflow.toFixed(1)}h przepalenie`:`${free.toFixed(1)}h wolne`;

      html+=`<div class="t-cell">`;
      projData.forEach(({proj,ph})=>{
        const c=projColorMap[proj];
        html+=`<div class="pill" style="background:${c.bg};border-color:${c.border}">
          <span class="pill-dot" style="background:${c.dot}"></span>
          <span class="pill-name" style="color:${c.text}">${proj}</span>
          <span class="pill-h" style="color:${c.text}">${ph.toFixed(1)}h</span>
        </div>`;
      });
      if(projData.length>0){
        html+=`<div class="divider"></div><div class="stack-bar">`;
        projData.forEach(({proj,ph})=>{
          html+=`<div class="stack-seg" style="width:${Math.min((ph/CAP_PER_PERSON)*100,100)}%;background:${projColorMap[proj].dot}"></div>`;
        });
        const fp=Math.max(0,((CAP_PER_PERSON-hrs)/CAP_PER_PERSON)*100);
        if(fp>0)html+=`<div class="stack-seg stack-free" style="width:${fp}%"></div>`;
        html+=`</div><div class="bottom-row"><span class="used-label">${hrs.toFixed(1)} / 40h</span><span class="free-label ${freeCls}">${freeText}</span></div>`;
      } else {
        html+=`<div class="stack-bar"><div class="stack-seg stack-free" style="width:100%"></div></div><div class="bottom-row"><span class="used-label">0 / 40h</span><span class="free-label free-ok">40h wolne</span></div>`;
      }
      html+=`</div>`;
    });
    html+='</div>';
  });

  html+='</div>';
  document.getElementById('main').innerHTML=html;
}
</script>
</body>
</html>
